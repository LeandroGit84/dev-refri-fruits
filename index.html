<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevClub Refri</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="item active" style="--background: #ea3d41">
        <div class="title">Morango</div>
        <img src="img/morango.png" alt="Morangos" class="fruit" />
        <img src="img/1-morango.png" alt="Refri de morango" class="refri" />
      </div>

      <div class="item" style="--background: #2d5643">
        <div class="title">Abacate</div>
        <img src="img/abacate.png" alt="Abacate" class="fruit" />
        <img src="img/2-abacate.png" alt="Refri de abacate" class="refri" />
      </div>

      <div class="item hidden" style="--background: #e7a043">
        <div class="title">Laranja</div>
        <img src="img/laranja.png" alt="Morangos" class="fruit" />
        <img src="img/3-laranja.png" alt="Refri de laranja" class="refri" />
      </div>

      <div class="arrow">
        <button id="prev"> < </button>
        <button id="next"> > </button>
      </div>
    </main>
      <script src="script.js"></script>

  </body>
</html>
